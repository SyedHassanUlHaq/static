<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Analyzer</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
    }
    button {
      background: #ff3235;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }
    .loading {
      color: #facc15;
      margin-top: 10px;
    }
    .error {
      background: #2a0000;
      color: #ff6b6b;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      white-space: pre-wrap;
      font-size: 12px;
    }
    .log {
      background: #0a0a0a;
      color: #9ca3af;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    table th, table td {
      border: 1px solid #333;
      padding: 6px 8px;
      text-align: left;
    }
    table th {
      background: #222;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>AI Video Analyzer</h2>

    <input type="file" id="videoInput" accept="video/*" />

    <div>
      <label><input type="checkbox" id="ai" /> Detect AI Generated</label><br />
      <label><input type="checkbox" id="scene" /> Detect Scene Cuts</label><br />
      <label><input type="checkbox" id="lipsync" /> Check Lip Sync</label>
    </div>

    <br />
    <button onclick="analyze()">Analyze Video</button>

    <div id="loading" class="loading"></div>
    <div id="error" class="error" style="display:none"></div>
    <div id="logs" class="log"></div>
    <div id="results"></div>
  </div>

  <script>
    function log(msg) {
      const logs = document.getElementById('logs');
      logs.innerText += "\n" + msg;
      console.log(msg);
    }

    function showError(msg) {
      const errorDiv = document.getElementById('error');
      errorDiv.style.display = 'block';
      errorDiv.innerText = msg;
    }

    async function safeFetch(url, formData) {
      log("Calling: " + url);

      const res = await fetch(url, {
        method: 'POST',
        body: formData
      });

      log("Status: " + res.status);

      const text = await res.text();
      log("Raw response: " + text.substring(0, 500));

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${text}`);
      }

      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error("Invalid JSON: " + text);
      }
    }

    async function analyze() {
      const file = document.getElementById('videoInput').files[0];
      if (!file) return alert('Upload a video');

      const doAI = document.getElementById('ai').checked;
      const doScene = document.getElementById('scene').checked;
      const doLip = document.getElementById('lipsync').checked;

      const loading = document.getElementById('loading');
      const resultsDiv = document.getElementById('results');

      document.getElementById('error').style.display = 'none';
      document.getElementById('logs').innerText = '';

      loading.innerText = 'Processing... This may take 2-3 minutes ⏳';
      resultsDiv.innerHTML = '';

      try {
        const results = {};

        if (doScene) {
          const fd = new FormData();
          fd.append('video', file);
          results.scene = await safeFetch('https://api.tempdomain.store/api/v1/scene/detect-scenes', fd);
        }

        if (doAI) {
          const fd = new FormData();
          fd.append('file', file);
          results.ai = await safeFetch('https://api.tempdomain.store/api/v1/video/upload-video', fd);
        }

        if (doLip) {
          const fd = new FormData();
          fd.append('video', file);
          results.lip = await safeFetch('https://lipsync.tempdomain.store/lipsync/inference', fd);
        }

        renderResults(results);
      } catch (e) {
        console.error(e);
        showError(e.message);
      }

      loading.innerText = '';
    }

    function renderResults(data) {
      const container = document.getElementById('results');

      // --- AI Detection ---
      if (data.ai) {
        const results = data.ai.results;

        let fakeScore = 0, realScore = 0;
        let fakeCount = 0, realCount = 0;

        results.forEach(r => {
          if (r.result.prediction === 'Fake') {
            fakeScore += r.result.probability;
            fakeCount++;
          } else {
            realScore += r.result.probability;
            realCount++;
          }
        });
        const fakeAvg = fakeCount ? fakeScore / fakeCount : 0;
        const realAvg = realCount ? realScore / realCount : 0;
        const overallPrediction = fakeScore >= realScore ? 'Fake' : 'Real';

        let confidence = 0;

        if (overallPrediction === 'Fake') {
          confidence = fakeCount ? fakeScore / fakeCount : 0;
        } else {
          confidence = realCount ? realScore / realCount : 0;
        }

        let chunkDetails = results.map(r => 
          `<tr>
            <td>${r.chunk}</td>
            <td style="color:${r.result.prediction === 'Fake' ? '#ff4d4d':'#4dff88'}">
              ${r.result.prediction}
            </td>
            <td>${(r.result.probability*100).toFixed(1)}%</td>
          </tr>`
        ).join('');

        container.innerHTML += `
          <div class="card">
            <h3>AI Generated Detection</h3>

            <p><b>Overall Prediction:</b> 
              <span style="color:${overallPrediction==='Fake'?'#ff4d4d':'#4dff88'}">
                ${overallPrediction}
              </span>
            </p>

            <p><b>Confidence:</b> ${(confidence * 100).toFixed(1)}%</p>

            <p>
              <b>Fake Score:</b> ${(fakeAvg * 100).toFixed(1)}% |
              <b>Real Score:</b> ${(realAvg * 100).toFixed(1)}%
            </p>

            <details>
              <summary>See per-chunk results</summary>
              <table>
                <thead>
                  <tr><th>Chunk</th><th>Prediction</th><th>Confidence</th></tr>
                </thead>
                <tbody>${chunkDetails}</tbody>
              </table>
            </details>
          </div>
        `;
      }

      // --- Scene Detection ---
      if (data.scene) {
        const scenes = data.scene.scenes || [];
        container.innerHTML += `
          <div class="card">
            <h3>Scene Cuts</h3>
            <p>Total Scenes Detected: ${data.scene.total_scenes_detected}</p>
            ${scenes.length > 0 
              ? `<ul>${scenes.map(s => `<li>Scene ${s.scene_number} at ${s.timestamp} (Confidence: ${s.confidence})</li>`).join('')}</ul>` 
              : `<p>No scene changes detected. The video appears continuous.</p>`}
          </div>
        `;
      }

      // --- Lip Sync ---
      if (data.lip) {
        const s = data.lip.summary || {};
        container.innerHTML += `
          <div class="card">
            <h3>Lip Sync Analysis</h3>
            <p><b>Accuracy:</b> ${s.sync_accuracy_percent || 0}%</p>
            <p><b>Faces Detected:</b> ${s.faces_detected || 0}</p>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
