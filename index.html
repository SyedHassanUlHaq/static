<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Analyzer</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
    }
    button {
      background: #ff3235;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }
    .loading {
      color: #facc15;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>AI Video Analyzer</h2>

    <input type="file" id="videoInput" accept="video/*" />

    <div>
      <label><input type="checkbox" id="ai" /> Detect AI Generated</label><br />
      <label><input type="checkbox" id="scene" /> Detect Scene Cuts</label><br />
      <label><input type="checkbox" id="lipsync" /> Check Lip Sync</label>
    </div>

    <br />
    <button onclick="analyze()">Analyze Video</button>

    <div id="loading" class="loading"></div>
    <div id="results"></div>
  </div>

  <script>
    async function analyze() {
      const file = document.getElementById('videoInput').files[0];
      if (!file) return alert('Upload a video');

      const doAI = document.getElementById('ai').checked;
      const doScene = document.getElementById('scene').checked;
      const doLip = document.getElementById('lipsync').checked;

      const loading = document.getElementById('loading');
      const resultsDiv = document.getElementById('results');

      loading.innerText = 'Processing... This may take 2-3 minutes ⏳';
      resultsDiv.innerHTML = '';

      try {
        const results = {};

        if (doScene) {
          const fd = new FormData();
          fd.append('video', file);

          const res = await fetch('http://44.202.25.6:8000/api/v1/scene/detect-scenes', {
            method: 'POST',
            body: fd
          });
          results.scene = await res.json();
        }

        if (doAI) {
          const fd = new FormData();
          fd.append('file', file);

          const res = await fetch('http://44.202.25.6:8000/api/v1/video/upload-video', {
            method: 'POST',
            body: fd
          });
          results.ai = await res.json();
        }

        if (doLip) {
          const fd = new FormData();
          fd.append('video', file);

          const res = await fetch('http://44.202.25.6:8000/inference', {
            method: 'POST',
            body: fd
          });
          results.lip = await res.json();
        }

        renderResults(results);
      } catch (e) {
        alert('Error processing video');
        console.error(e);
      }

      loading.innerText = '';
    }

    function renderResults(data) {
      const container = document.getElementById('results');

      if (data.ai) {
        container.innerHTML += `
          <div class="card">
            <h3>AI Detection</h3>
            <p><b>${data.ai.overall.prediction}</b></p>
            <p>Confidence: ${(data.ai.overall.probability * 100).toFixed(1)}%</p>
          </div>
        `;
      }

      if (data.scene) {
        const scenes = data.scene.scenes.map(s => 
          `Scene ${s.scene_number} at ${s.timestamp} (${s.confidence})`
        ).join('<br>');

        container.innerHTML += `
          <div class="card">
            <h3>Scene Cuts</h3>
            <p>Total Scenes: ${data.scene.total_scenes_detected}</p>
            <p>${scenes}</p>
          </div>
        `;
      }

      if (data.lip) {
        const s = data.lip.summary;
        container.innerHTML += `
          <div class="card">
            <h3>Lip Sync</h3>
            <p>Quality: <b>${s.lipsync_quality}</b></p>
            <p>Accuracy: ${s.sync_accuracy_percent}%</p>
            <p>Faces: ${s.faces_detected}</p>
            <p>Issues: ${s.total_problem_segments}</p>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
